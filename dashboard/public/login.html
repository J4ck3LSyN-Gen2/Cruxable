<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX — Terminal Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020408;--text:#e8f4f0;--dim:#6a8a82;--accent:#64f0c8;
  --border:rgba(100,240,200,0.12);--mono:'IBM Plex Mono',monospace;
  --danger:#ff5f63;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;align-items:center;justify-content:center;overflow:hidden}
body.fail { --accent: var(--danger); --border: rgba(255,95,99,0.25); }

.logo-ring{width:120px;height:120px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:32px;transition:border-color 0.3s}
.logo-ring::before{content:'';position:absolute;inset:-8px;border:1px solid var(--border);border-radius:50%;border-top-color:var(--accent);animation:spin 2s linear infinite;transition:border-color 0.3s}
.logo-ring::after{content:'';position:absolute;inset:-16px;border:1px solid rgba(100,240,200,0.06);border-radius:50%;border-bottom-color:rgba(100,240,200,0.15);animation:spin 3s linear infinite reverse;transition:border-color 0.3s}
@keyframes spin{to{transform:rotate(360deg)}}

.logo-text{font-size:18px;font-weight:700;letter-spacing:0.2em;color:var(--accent);transition:color 0.3s}
.container{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:340px}

.auth-box{display:flex;flex-direction:column;gap:12px;width:100%;opacity:0;animation:fadein 0.6s ease forwards 0.2s}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

input{background:rgba(100,240,200,0.03);border:1px solid var(--border);color:var(--text);font-family:var(--mono);padding:12px;font-size:12px;outline:none;letter-spacing:0.1em;transition:all 0.3s}
input:focus{border-color:var(--accent);background:rgba(100,240,200,0.06)}
button{background:var(--accent);color:var(--bg);border:none;font-family:var(--mono);font-weight:700;padding:14px;cursor:pointer;letter-spacing:0.2em;font-size:11px;transition:opacity 0.2s}
button:hover{opacity:0.9}

#status{font-size:10px;color:var(--accent);text-align:center;min-height:14px;letter-spacing:0.15em;text-transform:uppercase;transition:color 0.3s}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease-in-out}
</style>
</head>
<body>
<div class="container">
  <div class="logo-ring"><span class="logo-text">CX</span></div>
  <div id="status">Secure Terminal Access</div>
  <form class="auth-box" id="authForm">
    <input type="text" id="user" placeholder="OPERATOR ID" required autocomplete="off">
    <input type="password" id="pass" placeholder="ACCESS CODE" required>
    <button type="submit">AUTHORIZE</button>
  </form>
</div>
<script>
const form = document.getElementById('authForm');
const status = document.getElementById('status');

form.onsubmit = async (e) => {
  e.preventDefault();
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  status.textContent = 'VALIDATING CREDENTIALS...';
  
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });
    
    if (res.ok) {
      status.textContent = 'ACCESS GRANTED — INITIALIZING';
      setTimeout(() => location.replace('/'), 600);
    } else {
      const data = await res.json();
      document.body.classList.add('fail');
      form.classList.add('shake');
      status.textContent = data.error || 'ACCESS DENIED';
      
      setTimeout(() => {
        document.body.classList.remove('fail');
        form.classList.remove('shake');
      }, 1000);
    }
  } catch (err) {
    status.textContent = 'COMMUNICATIONS FAILURE';
  }
};

// Apply theme if saved
const savedTheme = localStorage.getItem('crucixTheme') || 'terminal';
if (savedTheme !== 'terminal') document.body.classList.add('theme-' + savedTheme);
</script>
</body>
</html>
